<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLOW.ME ✨ | Glam Apparel & Bags</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,900&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Montserrat', sans-serif;
    }

    html {
      scroll-behavior: smooth; /* Плавный скролл для эффекта путешествия */
    }

    body {
      background: #0d0108;
      color: #ffffff;
      overflow-x: hidden;
    }

    /* Гламурный Header */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 18px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(13, 1, 8, 0.85);
      backdrop-filter: blur(15px);
      z-index: 1000;
      border-bottom: 1px solid rgba(255, 20, 147, 0.25);
    }

    .logo {
      font-size: 28px;
      font-weight: 900;
      text-transform: lowercase;
      letter-spacing: 1px;
      color: #ffffff;
      text-decoration: none;
    }

    .logo span {
      color: #ff1493;
      text-shadow: 0 0 12px #ff1493, 0 0 25px #ff69b4;
    }

    /* Главный экран (Hero) */
    .hero {
      height: 100vh;
      background: radial-gradient(circle at center, #ff1493 0%, #3a0022 65%, #0d0108 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 20px;
      position: relative;
    }

    .hero-badge {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(8px);
      padding: 8px 20px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 20px;
      color: #fff;
    }

    .hero h1 {
      font-size: 64px;
      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
      line-height: 1.1;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(255, 20, 147, 0.6);
    }

    .hero p {
      font-size: 18px;
      color: #ffe6f2;
      max-width: 550px;
      margin-bottom: 35px;
    }

    .hero-btn {
      background: #ffffff;
      color: #ff1493;
      padding: 18px 42px;
      border-radius: 30px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border: none;
      cursor: pointer;
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.5);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-decoration: none;
      display: inline-block;
    }

    .hero-btn:hover {
      background: #ff1493;
      color: #ffffff;
      box-shadow: 0 0 35px #ff1493;
      transform: scale(1.08) translateY(-3px);
    }

    /* Начало Мира Шопинга (Каталог) */
    .shopping-world {
      min-height: 100vh;
      padding: 100px 40px 60px;
      background: linear-gradient(180deg, #0d0108 0%, #1f0215 50%, #0d0108 100%);
      position: relative;
    }

    .world-header {
      text-align: center;
      margin-bottom: 50px;
    }

    .world-tag {
      color: #ff69b4;
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 10px;
      display: block;
    }

    .world-title {
      font-size: 42px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .world-title span {
      background: linear-gradient(45deg, #ff1493, #ff85c0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Интерактивные Категории-Порталы */
    .categories {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 50px;
      flex-wrap: wrap;
    }

    .cat-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 20, 147, 0.3);
      color: #fff;
      padding: 12px 28px;
      border-radius: 25px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .cat-btn.active, .cat-btn:hover {
      background: #ff1493;
      border-color: #ff1493;
      box-shadow: 0 0 15px rgba(255, 20, 147, 0.6);
    }

    /* Сетка товаров */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 20px;
      transition: all 0.4s ease;
      position: relative;
    }

    .card:hover {
      transform: translateY(-10px);
      border-color: #ff1493;
      background: rgba(255, 20, 147, 0.08);
      box-shadow: 0 15px 35px rgba(255, 20, 147, 0.25);
    }

    .product-img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 18px;
      margin-bottom: 15px;
    }

    .product-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .price {
      font-size: 22px;
      font-weight: 900;
      color: #ff69b4;
      margin-bottom: 15px;
    }

    .add-btn {
      width: 100%;
      background: linear-gradient(135deg, #ff1493, #ff69b4);
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 16px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: 0.3s;
    }

    .add-btn:hover {
      box-shadow: 0 0 20px #ff1493;
    }
  </style>
</head>
<body>

  <header>
    <a href="#" class="logo">glow<span>.me</span> ✨</a>
    <div style="font-weight: 700; font-size: 14px; color: #ff85c0;">BARBIE SELECTION</div>
  </header>

  <!-- НАЧАЛО СТРАНИЦЫ (HERO) -->
  <section class="hero">
    <div class="hero-badge">Official Barbie Vibe</div>
    <h1>time to glow</h1>
    <p>Эксклюзивные сумки и одежда из линейки Barbie для твоего самого яркого образа.</p>
    <a href="#catalog" class="hero-btn">Смотреть каталог 🛍️</a>
  </section>

  <!-- МИР ШОПИНГА (КАТАЛОГ) -->
  <section class="shopping-world" id="catalog">
    <div class="world-header">
      <span class="world-tag">Welcome to Barbie World</span>
      <h2 class="world-title">Твоя <span>Glam Коллекция</span></h2>
    </div>

    <!-- Фильтры-Переключатели -->
    <div class="categories">
      <button class="cat-btn active">Всё сразу ✨</button>
      <button class="cat-btn">Сумки 👜</button>
      <button class="cat-btn">Одежда 👗</button>
      <button class="cat-btn">Обувь & Аксессуары 👠</button>
    </div>

    <!-- Карточки товаров -->
    <!-- ТОВАР 1 -->
<div class="card">
  <img src="./bag1.PNG" class="product-img" alt="Моя сумка">
  <div class="product-title">Розовая сумка Barbie </div>
  <div class="price">5 300 ₽</div>
  <button class="add-btn">В корзиночку 🛍️</button>
</div>

      <div class="card">
  <img src="./bag2.PNG" class="product-img" alt="Моя сумка">
  <div class="product-title">Голубая сумка Barbie </div>
  <div class="price">5 300 ₽</div>
  <button class="add-btn">В корзиночку 🛍️</button>
</div>

     <div class="card">
  <img src="./bag3.PNG" class="product-img" alt="Моя сумка">
  <div class="product-title">Черная сумка Barbie </div>
  <div class="price">5 300 ₽</div>
  <button class="add-btn">В корзиночку 🛍️</button>
</div>

    </div>
  </section>

</body>
</html>
