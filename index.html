<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLOW.ME ✨ | Glam Apparel & Bags</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,900&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Montserrat', sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: #0d0108;
      color: #ffffff;
      overflow-x: hidden;
    }

    /* Навигация */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 18px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(13, 1, 8, 0.85);
      backdrop-filter: blur(15px);
      z-index: 1000;
      border-bottom: 1px solid rgba(255, 20, 147, 0.25);
    }

    .logo {
      font-size: 26px;
      font-weight: 900;
      text-transform: lowercase;
      color: #ffffff;
      text-decoration: none;
    }

    .logo span {
      color: #ff1493;
      text-shadow: 0 0 12px #ff1493;
    }

    /* Главный Экран */
    .hero {
      height: 100vh;
      background: radial-gradient(circle at center, #ff1493 0%, #3a0022 65%, #0d0108 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 20px;
    }

    .hero-badge {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(8px);
      padding: 8px 20px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .hero h1 {
      font-size: 64px;
      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
      line-height: 1.1;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(255, 20, 147, 0.6);
    }

    .hero p {
      font-size: 18px;
      color: #ffe6f2;
      max-width: 550px;
      margin-bottom: 35px;
    }

    .hero-btn {
      background: #ffffff;
      color: #ff1493;
      padding: 18px 42px;
      border-radius: 30px;
      font-weight: 900;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.5);
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .hero-btn:hover {
      background: #ff1493;
      color: #ffffff;
      box-shadow: 0 0 35px #ff1493;
      transform: scale(1.05);
    }

    /* Секция Каталога */
    .shopping-world {
      min-height: 100vh;
      padding: 120px 20px 80px;
      background: linear-gradient(180deg, #0d0108 0%, #1f0215 50%, #0d0108 100%);
    }

    /* Категории */
    .categories {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 50px;
      flex-wrap: wrap;
    }

    .cat-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 20, 147, 0.3);
      color: #fff;
      padding: 12px 26px;
      border-radius: 25px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .cat-btn.active, .cat-btn:hover {
      background: #ff1493;
      border-color: #ff1493;
      box-shadow: 0 0 15px rgba(255, 20, 147, 0.6);
    }

    /* Эргономичная Сетка Товаров */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 340px));
      justify-content: center;
      gap: 30px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Компактная Карточка */
    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 20, 147, 0.25);
      border-radius: 20px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .card:hover {
      transform: translateY(-8px);
      border-color: #ff1493;
      box-shadow: 0 10px 30px rgba(255, 20, 147, 0.3);
      background: rgba(255, 20, 147, 0.05);
    }

    /* Блок с фото (контейнер) */
    .img-container {
      width: 100%;
      height: 280px;
      border-radius: 14px;
      overflow: hidden;
      background: #1a0512;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
    }

    .product-img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* Картинка полностью поместится и не обрезается */
      padding: 10px;
      transition: transform 0.3s ease;
    }

    .card:hover .product-img {
      transform: scale(1.05);
    }

    .product-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 8px;
      color: #ffffff;
    }

    .price {
      font-size: 22px;
      font-weight: 900;
      color: #ff69b4;
      margin-bottom: 18px;
    }

    .add-btn {
      width: 100%;
      background: linear-gradient(135deg, #ff1493, #ff69b4);
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(255, 20, 147, 0.3);
    }

    .add-btn:hover {
      box-shadow: 0 0 20px #ff1493;
      transform: scale(1.02);
    }
  </style>
</head>
<body>

  <header>
    <a href="#" class="logo">glow<span>.me</span> ✨</a>
    <div style="font-weight: 700; font-size: 13px; color: #ff85c0; letter-spacing: 1px;">BARBIE SELECTION</div>
  </header>

  <section class="hero">
    <div class="hero-badge">Official Barbie Vibe</div>
    <h1>time to glow</h1>
    <p>Эксклюзивные сумки и одежда из линейки Barbie для твоего самого яркого образа.</p>
    <a href="#catalog" class="hero-btn">Смотреть каталог 🛍️</a>
  </section>

  <section class="shopping-world" id="catalog">

    <div class="categories">
      <button class="cat-btn active">Всё сразу ✨</button>
      <button class="cat-btn">Сумки 👜</button>
      <button class="cat-btn">Одежда 👗</button>
      <button class="cat-btn">Аксессуары 👠</button>
    </div>

    <div class="grid">
      
      <!-- ТОВАР 1 -->
      <div class="card">
        <div class="img-container">
          <img src="./bag1.PNG" class="product-img" alt="Розовая сумка Barbie">
        </div>
        <div class="product-title">Розовая сумка Barbie</div>
        <div class="price">5 300 ₽</div>
        <button class="add-btn">В корзиночку 🛍️</button>
      </div>

      <!-- ТОВАР 2 -->
      <div class="card">
        <div class="img-container">
          <img src="./bag2.PNG" class="product-img" alt="Голубая сумка Barbie">
        </div>
        <div class="product-title">Голубая сумка Barbie</div>
        <div class="price">5 300 ₽</div>
        <button class="add-btn">В корзиночку 🛍️</button>
      </div>

      <!-- ТОВАР 3 -->
      <div class="card">
        <div class="img-container">
          <img src="./bag3.PNG" class="product-img" alt="Черная сумка Barbie">
        </div>
        <div class="product-title">Черная сумка Barbie</div>
        <div class="price">5 300 ₽</div>
        <button class="add-btn">В корзиночку 🛍️</button>
      </div>

    </div>
  </section>

</body>
</html>
